spring:

  application:
    name: basket-love-api

  datasource:
    url: jdbc:mysql://localhost:3306/basket_love_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  jackson:
    serialization:
      fail-on-empty-beans: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: TU_CORREO
    password: TU_APP_PASSWORD

    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG

app:
  jwt:
    secret: basketlovebasketlovebasketlovebasketlovebasketlove123456789
    expiration: 86400000